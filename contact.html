<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact – Hristina EduCare</title>
  <meta
    name="description"
    content="Contactează centrul after‑school Hristina EduCare. Găsește locația noastră, datele de contact și trimite un mesaj."
  >

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Lobster&display=swap" rel="stylesheet">
  <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Main Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header id="header"></header>

  <!-- ================= MAIN ================= -->
  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-content">
        <h1>Contact</h1>
        <p>Suntem aici pentru orice întrebare</p>
      </div>
    </section>

    <!-- LOCATION -->
    <section class="section-blue">
      <div class="content-box">
        <h2>Locație</h2>

        <div class="map-wrapper">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d2785.6366695900124!2d21.2662357!3d45.7183253!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47455e70b706b6eb%3A0xe1d64b8c6aa4b679!2sCalea%20Urseni%2018%2C%20307285%20Timi%C8%99oara!5e0!3m2!1sen!2sro!4v1777032272245!5m2!1sen!2sro"
            width="800"
            height="550"
            style="border:0;"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Locația Hristina EduCare">
          </iframe>
        </div>

        <p>
          <strong>Adresă:</strong> Calea Urseni 18, Timișoara, 307285
        </p>
      </div>
    </section>

    <!-- CONTACT INFO -->
    <section class="section-green">
      <div class="content-box">
        <h2>Date de contact</h2>
        <p><strong>Email:</strong> <a href="mailto:hristinaeducare24@gmail.com">hristinaeducare24@gmail.com</a></p>
        <p><strong>Telefon:</strong> <a href="tel:+40755 542 992">+40 755 542 992</a></p>
      </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="section-pink">
      <div class="content-box">
        <h2>Trimite un mesaj</h2>

        
<form
      action="https://formspree.io/f/xrerrbyr"
      method="POST"
      class="contact-form"
    >
      <input type="text" name="name" placeholder="Nume" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Telefon" required>

      <textarea
        name="message"
        placeholder="Mesaj"
        required
      ></textarea>

      <button type="submit" class="btn">
        Trimite mesajul
      </button>
    </form>
  </div>
</section>


  </main>

  <!-- ================= FOOTER ================= -->
  <footer id="footer"></footer>

  <!-- ================= COOKIE BANNER ================= -->
  <div id="cookie-banner" class="cookie-banner" role="dialog" aria-live="polite">
    <p>
      Acest site folosește cookie‑uri pentru a îmbunătăți experiența utilizatorului.
    </p>
    <button id="accept-cookies" class="btn">Accept</button>
  </div>

  <!-- ================= GO TO TOP BUTTON ================= -->
  <button id="goTopBtn" title="Mergi sus" aria-label="Mergi sus">↑</button>

  <script src="js/main.js" defer></script>

</body>
</html>
